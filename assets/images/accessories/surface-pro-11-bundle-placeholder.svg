<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">Surface Pro 11 accessories</title>
  <desc id="desc">Promotional artwork for the Surface Pro 11 protective case and screen cover.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e2b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a7f3d0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="1000" fill="url(#bg)" rx="48"/>
  <circle cx="1120" cy="190" r="170" fill="#a7f3d0" fill-opacity="0.10"/>
  <circle cx="260" cy="840" r="210" fill="#10b981" fill-opacity="0.14"/>
  <rect x="86" y="84" width="1228" height="832" rx="40" fill="#0f172a" fill-opacity="0.58" stroke="#e2e8f0" stroke-opacity="0.16"/>
  <text x="130" y="160" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="34" letter-spacing="4">TABLET MASTERS ACCESSORIES</text>
  <text x="130" y="226" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">Surface Pro 11</text>
  <text x="130" y="276" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="28">Microsoft protective case and screen cover</text>
  <g transform="translate(150 360)">
    <rect x="0" y="0" width="500" height="370" rx="34" fill="url(#card)"/>
    <rect x="38" y="34" width="424" height="302" rx="28" fill="#0f172a" fill-opacity="0.82" stroke="#f8fafc" stroke-opacity="0.22" stroke-width="6"/>
    <rect x="66" y="64" width="368" height="242" rx="22" fill="#111827" stroke="#93c5fd" stroke-opacity="0.22" stroke-width="4"/>
    <rect x="102" y="104" width="298" height="162" rx="16" fill="#0b1120" stroke="#ffffff" stroke-opacity="0.12" stroke-dasharray="18 12" stroke-width="4"/>
    <text x="250" y="172" text-anchor="middle" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">PROTECTIVE CASE</text>
    <text x="250" y="214" text-anchor="middle" fill="#bfdbfe" font-family="Arial, Helvetica, sans-serif" font-size="24">Raised edges and daily carry protection</text>
    <text x="250" y="300" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="22">Camera coverage • button access • secure fit</text>
  </g>
  <g transform="translate(760 408)">
    <rect x="0" y="0" width="420" height="280" rx="30" fill="#f8fafc" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.18" stroke-width="4"/>
    <rect x="38" y="30" width="344" height="220" rx="22" fill="#dbeafe" fill-opacity="0.92"/>
    <rect x="56" y="48" width="308" height="184" rx="16" fill="#f8fafc" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.4" stroke-width="3"/>
    <text x="210" y="130" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">SCREEN COVER</text>
    <text x="210" y="172" text-anchor="middle" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="22">Everyday scratch protection</text>
  </g>
  <g transform="translate(760 760)">
    <text x="0" y="0" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Accessory bundle</text>
    <text x="0" y="46" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="24">Built for this tablet family with a cleaner, more protected daily setup.</text>
    <text x="0" y="84" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="24">Add a case, add a screen cover, or pair both together.</text>
  </g>
</svg>
